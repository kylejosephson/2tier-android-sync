# ------------------------------------------------------------
# Project-wide Gradle settings
# ------------------------------------------------------------

# JVM args for Gradle (memory + encoding)
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# ------------------------------------------------------------
# Android / AndroidX
# ------------------------------------------------------------

android.useAndroidX=true
android.nonTransitiveRClass=true

# ------------------------------------------------------------
# Kotlin
# ------------------------------------------------------------

# Use official Kotlin code style
kotlin.code.style=official

# *** CRITICAL WINDOWS FIX ***
# Disable Kotlin compile daemon to prevent
# "Could not connect to Kotlin compile daemon"
kotlin.compiler.execution.strategy=in-process

# ------------------------------------------------------------
# Gradle performance / stability
# ------------------------------------------------------------

# Limit worker processes to avoid JVM starvation on Windows
org.gradle.workers.max=2
